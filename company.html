<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>会社概要 | 大和電気株式会社</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        :root { --main-blue: #00479d; --hover-yellow: #ffeb3b; }
        body, html { margin: 0; padding: 0; width: 100%; font-family: sans-serif; background-color: #fcfcfc; }
        header {
            position: fixed; top: 0; width: 100%; padding: 20px 60px; box-sizing: border-box; z-index: 100;
            background: rgba(0, 0, 0, 0.7); display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(5px);
        }
        .logo-area { display: flex; align-items: center; text-decoration: none; color: white; }
        .logo-image { height: 55px; width: auto; margin-right: 20px; }
        .company-name { font-size: 26px; font-weight: bold; color: white; }
        nav ul { list-style: none; margin: 0; padding: 0; display: flex; gap: 40px; }
        nav ul li a { text-decoration: none; color: white; display: flex; flex-direction: column; align-items: center; transition: 0.3s; position: relative; }
        .nav-jp { font-size: 16px; font-weight: bold; }
        nav ul li a:hover { transform: scale(1.15); color: var(--hover-yellow); }

        .container { max-width: 900px; margin: 160px auto 80px; padding: 40px; background: white; box-shadow: 0 4px 20px rgba(0,0,0,0.05); border-radius: 8px; }
        .company-table { width: 100%; border-collapse: collapse; }
        .company-table th, .company-table td { padding: 25px; border-bottom: 1px solid #eee; text-align: left; }
        .company-table th { width: 30%; color: var(--main-blue); background: #f9f9f9; }

        footer { background: #222; color: #fff; padding: 30px; text-align: center; }
        @media (max-width: 900px) { header { flex-direction: column; padding: 15px; } .container { margin-top: 240px; } }
    </style>
</head>
<body>
    <header>
        <a href="index.html" class="logo-area">
            <img src="miko.png" alt="ロゴ" class="logo-image">
            <span class="company-name">大和電気株式会社</span>
        </a>
        <nav>
            <ul>
                <li><a href="index.html#business"><span class="nav-jp">事業案内</span><span class="nav-en">Business</span></a></li>
                <li><a href="index.html#works"><span class="nav-jp">実績紹介</span><span class="nav-en">Works</span></a></li>
                <li><a href="company.html"><span class="nav-jp">会社概要</span><span class="nav-en">Company</span></a></li>
                <li><a href="contact.html"><span class="nav-jp">お問い合わせ</span><span class="nav-en">Contact</span></a></li>
                <li><a href="recruit.html"><span class="nav-jp">採用情報</span><span class="nav-en">Recruit</span></a></li>
            </ul>
        </nav>
    </header>
    <div class="container">
        <h1 style="text-align: center; color: #00479d;">会社概要</h1>
        <table class="company-table">
            <tr><th>会社名</th><td>大和電気株式会社</td></tr>
            <tr><th>代表者</th><td>山田 太郎</td></tr>
            <tr><th>事業内容</th><td>電気設備工事・通信工事</td></tr>
        </table>
    </div>
    <footer>&copy; 2026 DAIWA DENKI</footer>
</body>
</html>
