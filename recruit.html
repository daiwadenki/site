<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>採用情報 | 大和電気株式会社</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        :root { --main-blue: #00479d; --accent-pink: #ff4081; --hover-yellow: #ffeb3b; }
        body, html { margin: 0; padding: 0; width: 100%; font-family: sans-serif; background-color: #fff; overflow-x: hidden; }
        
        .bg-animation { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: -1; background: #f8faff; overflow: hidden; }
        .shape { position: absolute; background: rgba(0, 71, 157, 0.03); border: 1px solid rgba(0, 71, 157, 0.05); animation: move 20s linear infinite; }
        .shape-sq { width: 100px; height: 100px; }
        @keyframes move { 0% { transform: translateY(100vh) rotate(0deg); opacity: 0; } 100% { transform: translateY(-20vh) rotate(360deg); opacity: 0; } }

        header {
            position: fixed; top: 0; width: 100%; padding: 20px 60px; box-sizing: border-box; z-index: 100;
            background: rgba(0, 0, 0, 0.7); display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(5px);
        }
        .logo-area { display: flex; align-items: center; text-decoration: none; color: white; }
        .logo-image { height: 55px; width: auto; margin-right: 20px; }
        .company-name { font-size: 26px; font-weight: bold; color: white; }

        nav ul { list-style: none; margin: 0; padding: 0; display: flex; gap: 40px; }
        nav ul li a { text-decoration: none; color: white; display: flex; flex-direction: column; align-items: center; transition: 0.3s; position: relative; }
        .nav-jp { font-size: 16px; font-weight: bold; }
        nav ul li a:hover { transform: scale(1.15); color: var(--hover-yellow); }

        .container { max-width: 1000px; margin: 150px auto 60px; padding: 20px; }
        section { background: rgba(255, 255, 255, 0.95); padding: 50px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.03); margin-bottom: 50px; text-align: center; }
        .back-btn { display: block; width: fit-content; margin: 40px auto 0; padding: 18px 60px; background: var(--accent-pink); color: white; text-decoration: none; border-radius: 50px; font-weight: bold; }

        footer { background: #222; color: #fff; padding: 30px; text-align: center; }
        @media (max-width: 900px) { header { flex-direction: column; padding: 15px; } .container { margin-top: 220px; } }
    </style>
</head>
<body>
    <div class="bg-animation"><div class="shape shape-sq" style="left: 10%;"></div><div class="shape shape-sq" style="left: 80%; animation-delay: 5s;"></div></div>
    <header>
        <a href="index.html" class="logo-area">
            <img src="miko.png" alt="ロゴ" class="logo-image">
            <span class="company-name">大和電気株式会社</span>
        </a>
        <nav>
            <ul>
                <li><a href="index.html#business"><span class="nav-jp">事業案内</span><span class="nav-en">Business</span></a></li>
                <li><a href="index.html#works"><span class="nav-jp">実績紹介</span><span class="nav-en">Works</span></a></li>
                <li><a href="company.html"><span class="nav-jp">会社概要</span><span class="nav-en">Company</span></a></li>
                <li><a href="contact.html"><span class="nav-jp">お問い合わせ</span><span class="nav-en">Contact</span></a></li>
                <li><a href="recruit.html"><span class="nav-jp">採用情報</span><span class="nav-en">Recruit</span></a></li>
            </ul>
        </nav>
    </header>
    <div class="container">
        <section>
            <h1>採用メッセージ</h1>
            <p>電気のプロフェッショナルとして、共に未来を創る仲間を募集しています。</p>
            <a href="contact.html" class="back-btn">応募する</a>
        </section>
    </div>
    <footer>&copy; 2026 DAIWA DENKI</footer>
</body>
</html>
