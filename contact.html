<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>お問い合わせ | 大和電気株式会社</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">

    <style>
        /* --- 1. ローディング画面（共通） --- */
        #loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #00479d; display: flex; justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        #loading.loaded { opacity: 0; visibility: hidden; }
        .loading-content { text-align: center; }
        .dot { display: inline-block; width: 25px; height: 25px; margin: 0 10px; background-color: #ffeb3b; border-radius: 50%; animation: bounce 0.6s infinite alternate; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-30px); scale: 1.1; } }
        .loading-text { margin-top: 30px; color: white; font-weight: bold; letter-spacing: 0.4em; font-size: 14px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* --- 2. 全体設定 --- */
        body, html {
            margin: 0; padding: 0; width: 100%;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            background-color: #f8faff; color: #333; overflow-x: hidden;
        }

        /* --- 3. ヘッダー（完成版メニューを完全移植） --- */
        header {
            position: fixed; top: 0; width: 100%; padding: 15px 40px; box-sizing: border-box; z-index: 100;
            background: rgba(0, 0, 0, 0.7); display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(8px);
        }
        .logo-area { display: flex; align-items: center; text-decoration: none; color: white; z-index: 110; }
        .logo-image { height: 50px; width: auto; margin-right: 15px; }
        .company-name { font-size: 24px; font-weight: bold; letter-spacing: 0.1em; }

        nav ul { list-style: none; margin: 0; padding: 0; display: flex; gap: 30px; }
        nav ul li a { 
            text-decoration: none; color: white; 
            display: flex; flex-direction: column; align-items: center; 
            transition: 0.3s; position: relative; padding-bottom: 5px;
        }
        .nav-jp { font-size: 15px; font-weight: bold; }
        .nav-en { font-size: 9px; margin-top: 2px; opacity: 0.7; letter-spacing: 0.1em; }

        /* ホバー時の黄色ライン演出（移植完了） */
        nav ul li a::after {
            content: ""; position: absolute; bottom: -2px; left: 0; width: 0; height: 2px;
            background: #ffeb3b; transition: width 0.3s ease;
        }
        nav ul li a:hover { color: #ffeb3b; transform: scale(1.1); }
        nav ul li a:hover::after { width: 100%; }

        /* スマホ用ボタン */
        .menu-btn { display: none; cursor: pointer; z-index: 110; background: none; border: none; flex-direction: column; gap: 6px; padding: 10px; }
        .menu-btn span { display: block; width: 30px; height: 2px; background: white; transition: 0.3s; }

        @media (max-width: 1024px) {
            header { padding: 15px 20px; }
            .company-name { font-size: 18px; }
            .logo-image { height: 40px; }
            .menu-btn { display: flex; }
            nav { 
                position: fixed; top: 0; right: -100%; width: 100%; height: 100vh; 
                background: rgba(0, 71, 157, 0.98); transition: 0.5s; 
                display: flex; align-items: center; justify-content: center; z-index: 105; 
            }
            nav.active { right: 0; }
            nav ul { flex-direction: column; gap: 40px; text-align: center; }
            .nav-jp { font-size: 22px; }
            .nav-en { font-size: 12px; }
            nav ul li a::after { left: 50%; transform: translateX(-50%); }
            .menu-btn.active span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
            .menu-btn.active span:nth-child(2) { opacity: 0; }
            .menu-btn.active span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }
        }

        /* --- 4. コンテンツエリア --- */
        .page-header {
            background-color: #00479d; color: white; padding: 160px 20px 80px; text-align: center;
        }
        .page-header h1 { font-size: 2.2rem; letter-spacing: 0.2em; margin: 0; }
        .page-header p { font-size: 0.9rem; opacity: 0.8; margin-top: 10px; letter-spacing: 0.3em; }

        .container { max-width: 800px; margin: -40px auto 100px; padding: 0 20px; position: relative; z-index: 2; }
        .contact-form {
            background: white; padding: 60px 50px; border-radius: 10px; box-shadow: 0 10px 30px rgba(0,0,0,0.05);
        }

        .form-group { margin-bottom: 30px; }
        .form-group label { display: block; font-weight: bold; margin-bottom: 10px; color: #00479d; font-size: 0.9rem; }
        .form-group input, .form-group textarea, .form-group select {
            width: 100%; padding: 15px; border: 1px solid #ddd; border-radius: 5px; font-size: 1rem; box-sizing: border-box; transition: 0.3s;
        }
        .form-group input:focus, .form-group textarea:focus {
            border-color: #00479d; outline: none; box-shadow: 0 0 8px rgba(0,71,157,0.1);
        }

        .submit-btn {
            display: block; width: 100%; padding: 20px; background: #00479d; color: white; border: none;
            border-radius: 50px; font-size: 1.1rem; font-weight: bold; cursor: pointer; transition: 0.3s; margin-top: 40px;
        }
        .submit-btn:hover { background: #003575; transform: translateY(-3px); box-shadow: 0 5px 15px rgba(0,71,157,0.3); }

        /* 電話誘導 */
        .tel-info { text-align: center; margin-top: 50px; background: #fff; padding: 40px; border-radius: 10px; border: 1px dashed #00479d; }
        .tel-info p { margin-bottom: 10px; color: #666; }
        .tel-number { font-size: 2rem; font-weight: bold; color: #00479d; text-decoration: none; }

        footer { background: #222; color: #fff; padding: 40px; text-align: center; font-size: 13px; }

        @media (max-width: 768px) {
            .contact-form { padding: 40px 20px; }
            .page-header h1 { font-size: 1.8rem; }
            .tel-number { font-size: 1.5rem; }
        }
    </style>
</head>
<body>

    <div id="loading"><div class="loading-content"><div class="dot"></div><div class="dot"></div><div class="dot"></div><p class="loading-text">CONNECTING...</p></div></div>

    <header>
        <a href="index.html" class="logo-area">
            <img src="miko.png" alt="ロゴ" class="logo-image">
            <span class="company-name">大和電気株式会社</span>
        </a>
        <button class="menu-btn" id="menuBtn"><span></span><span></span><span></span></button>
        <nav id="navMenu">
            <ul>
                <li><a href="index.html#about"><span class="nav-jp">会社概要</span><span class="nav-en">About</span></a></li>
                <li><a href="index.html#business"><span class="nav-jp">事業案内</span><span class="nav-en">Business</span></a></li>
                <li><a href="index.html#works"><span class="nav-jp">実績紹介</span><span class="nav-en">Works</span></a></li>
                <li><a href="contact.html"><span class="nav-jp">お問い合わせ</span><span class="nav-en">Contact</span></a></li>
                <li><a href="recruit.html"><span class="nav-jp">採用情報</span><span class="nav-en">Recruit</span></a></li>
            </ul>
        </nav>
    </header>

    <div class="page-header">
        <h1>お問い合わせ</h1>
        <p>CONTACT</p>
    </div>

    <div class="container">
        <div class="contact-form">
            <form action="#">
                <div class="form-group">
                    <label>お問い合わせ種別</label>
                    <select required>
                        <option value="">選択してください</option>
                        <option value="工事のご依頼">工事のご依頼・お見積り</option>
                        <option value="採用について">採用について</option>
                        <option value="その他">その他のお問い合わせ</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>お名前</label>
                    <input type="text" placeholder="例：大和 太郎" required>
                </div>
                <div class="form-group">
                    <label>メールアドレス</label>
                    <input type="email" placeholder="例：info@daiwa-denki.co.jp" required>
                </div>
                <div class="form-group">
                    <label>電話番号</label>
                    <input type="tel" placeholder="例：0312345678">
                </div>
                <div class="form-group">
                    <label>お問い合わせ内容</label>
                    <textarea rows="6" placeholder="具体的な内容をご記入ください" required></textarea>
                </div>
                <button type="submit" class="submit-btn">送信内容を確認する</button>
            </form>
        </div>

        <div class="tel-info">
            <p>お急ぎの方はお電話にてご連絡ください</p>
            <a href="tel:0312345678" class="tel-number">03-1234-5678</a>
            <p style="margin-top: 10px; font-size: 0.8rem;">受付時間：平日 9:00〜18:00</p>
        </div>
    </div>

    <footer>&copy; 2026 大和電気株式会社 All Rights Reserved.</footer>

    <script>
        window.addEventListener('load', function() {
            setTimeout(function() { document.getElementById('loading').classList.add('loaded'); }, 1500);
        });
        const menuBtn = document.getElementById('menuBtn');
        const navMenu = document.getElementById('navMenu');
        menuBtn.addEventListener('click', () => {
            menuBtn.classList.toggle('active');
            navMenu.classList.toggle('active');
        });
        function closeMenu() {
            menuBtn.classList.remove('active');
            navMenu.classList.remove('active');
        }
    </script>
</body>
</html>
