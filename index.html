<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大和電気株式会社 | YAMATO DENKI</title>
    
    <style>
        /* --- CSS: 全体の設定 --- */

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            overflow-x: hidden;
        }

        /* 背景動画 */
        #video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        /* ヘッダー */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 20px 50px;
            box-sizing: border-box;
            z-index: 100;
            background: rgba(0, 0, 0, 0.2); /* メニューを見やすくするため少し暗く */
        }

        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            justify-content: flex-end;
            gap: 40px;
        }

        /* メニュー項目を縦並びにするための設定 */
        nav ul li a {
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column; /* 縦に並べる */
            align-items: center;    /* 中央に寄せる */
            transition: 0.3s;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
        }

        /* 日本語部分 */
        .nav-jp {
            font-size: 16px;
            font-weight: bold;
            letter-spacing: 0.05em;
        }

        /* 英語部分（小さい文字） */
        .nav-en {
            font-size: 10px;
            font-weight: normal;
            letter-spacing: 0.1em;
            margin-top: 2px;
            opacity: 0.8; /* 少し透かしてサブ要素感を出す */
        }

        nav ul li a:hover {
            color: #aaa;
        }

        /* メインテキスト */
        .main-content {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            text-align: center;
        }

        .main-content h1 {
            font-size: 4rem;
            margin: 0;
            letter-spacing: 0.2em;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* スマホ用調整 */
        @media (max-width: 768px) {
            header {
                padding: 15px 10px;
            }
            nav ul {
                gap: 15px;
                justify-content: center; /* スマホでは中央寄せ */
            }
            .nav-jp {
                font-size: 12px;
            }
            .nav-en {
                font-size: 8px;
            }
            .main-content h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <video id="video-bg" autoplay muted loop playsinline>
        <source src="bg-video.mp4" type="video/mp4">
    </video>

    <header>
        <nav>
            <ul>
                <li>
                    <a href="#">
                        <span class="nav-jp">企業情報</span>
                        <span class="nav-en">Company</span>
                    </a>
                </li>
                <li>
                    <a href="#">
                        <span class="nav-jp">事業案内</span>
                        <span class="nav-en">Business</span>
                    </a>
                </li>
                <li>
                    <a href="#">
                        <span class="nav-jp">実績紹介</span>
                        <span class="nav-en">Works</span>
                    </a>
                </li>
                <li>
                    <a href="#">
                        <span class="nav-jp">採用情報</span>
                        <span class="nav-en">Recruit</span>
                    </a>
                </li>
                <li>
                    <a href="#">
                        <span class="nav-jp">お問い合わせ</span>
                        <span class="nav-en">Contact</span>
                    </a>
                </li>
            </ul>
        </nav>
    </header>

    <div class="main-content">
        <h1>YAMATO DENKI</h1>
    </div>

</body>
</html>
