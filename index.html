<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大和電気株式会社 | YAMATO DENKI</title>
    
    <style>
        /* --- CSS: 全体の設定 --- */

        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            overflow-x: hidden;
        }

        /* 背景動画 */
        #video-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: -1;
        }

        /* ヘッダー全体のレイアウト */
        header {
            position: fixed;
            top: 0;
            width: 100%;
            padding: 15px 40px;
            box-sizing: border-box;
            z-index: 100;
            background: rgba(0, 0, 0, 0.3); /* 文字の視認性を上げるため少し暗く */
            display: flex;
            justify-content: space-between; /* 左端と右端に分ける */
            align-items: center; /* 縦方向の中央揃え */
        }

        /* ロゴと社名のエリア */
        .logo-area {
            display: flex;
            align-items: center; /* 画像とテキストを横並びで中央揃え */
            text-decoration: none;
            color: white;
        }

        .logo-image {
            height: 40px; /* ロゴの高さ（適宜調整してください） */
            width: auto;
            margin-right: 15px; /* ロゴと名前の間の余白 */
        }

        .company-name {
            font-size: 20px;
            font-weight: bold;
            letter-spacing: 0.1em;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
        }

        /* メニュー（ナビゲーション） */
        nav ul {
            list-style: none;
            margin: 0;
            padding: 0;
            display: flex;
            gap: 30px;
        }

        nav ul li a {
            text-decoration: none;
            color: white;
            display: flex;
            flex-direction: column;
            align-items: center;
            transition: 0.3s;
            text-shadow: 1px 1px 5px rgba(0,0,0,0.5);
        }

        .nav-jp {
            font-size: 14px;
            font-weight: bold;
        }

        .nav-en {
            font-size: 9px;
            font-weight: normal;
            letter-spacing: 0.05em;
            margin-top: 2px;
            opacity: 0.8;
        }

        nav ul li a:hover {
            color: #aaa;
        }

        /* メインテキスト */
        .main-content {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            color: white;
            text-align: center;
        }

        .main-content h1 {
            font-size: 4rem;
            margin: 0;
            letter-spacing: 0.2em;
            text-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        /* スマホ用調整 */
        @media (max-width: 900px) {
            header {
                padding: 10px 20px;
                flex-direction: column; /* スマホでは縦に並べる（ロゴが上、メニューが下） */
                gap: 10px;
            }
            .logo-image {
                height: 30px;
            }
            .company-name {
                font-size: 16px;
            }
            nav ul {
                gap: 15px;
            }
            .nav-jp {
                font-size: 11px;
            }
            .main-content h1 {
                font-size: 2rem;
            }
        }
    </style>
</head>
<body>

    <video id="video-bg" autoplay muted loop playsinline>
        <source src="bg-video.mp4" type="video/mp4">
    </video>

    <header>
        <a href="/" class="logo-area">
            <img src="miko.png" alt="大和電気 ロゴ" class="logo-image">
            <span class="company-name">大和電気</span>
        </a>

        <nav>
            <ul>
                <li><a href="#"><span class="nav-jp">企業情報</span><span class="nav-en">Company</span></a></li>
                <li><a href="#"><span class="nav-jp">事業案内</span><span class="nav-en">Business</span></a></li>
                <li><a href="#"><span class="nav-jp">実績紹介</span><span class="nav-en">Works</span></a></li>
                <li><a href="#"><span class="nav-jp">採用情報</span><span class="nav-en">Recruit</span></a></li>
                <li><a href="#"><span class="nav-jp">お問い合わせ</span><span class="nav-en">Contact</span></a></li>
            </ul>
        </nav>
    </header>

    <div class="main-content">
        <h1>YAMATO DENKI</h1>
    </div>

</body>
</html>
