<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大和電気株式会社 | DAIWA DENKI</title>
    
    <link rel="icon" href="favicon.ico" type="image/x-icon">

    <style>
        /* --- 1. ローディング画面 (画面いっぱいのポップな演出) --- */
        #loading {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background-color: #00479d; /* 企業カラー */
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        #loading.loaded {
            opacity: 0;
            visibility: hidden;
        }
        .loading-content { text-align: center; }
        .dot {
            display: inline-block;
            width: 25px; height: 25px;
            margin: 0 10px;
            background-color: #ffeb3b; /* 電気の黄色 */
            border-radius: 50%;
            animation: bounce 0.6s infinite alternate;
        }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-30px); scale: 1.1; }
        }
        .loading-text {
            margin-top: 30px;
            color: white;
            font-weight: bold;
            letter-spacing: 0.4em;
            font-size: 14px;
            animation: pulse 1.5s infinite;
        }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        /* --- 2. 全体設定 --- */
        body, html {
            margin: 0; padding: 0; width: 100%;
            font-family: "Helvetica Neue", Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", Meiryo, sans-serif;
            scroll-behavior: smooth;
            color: #333;
            overflow-x: hidden;
        }

        /* --- 3. ヘッダー (PC/スマホ可変) --- */
        header {
            position: fixed;
            top: 0; width: 100%;
            padding: 15px 40px;
            box-sizing: border-box;
            z-index: 100;
            background: rgba(0, 0, 0, 0.7); 
            display: flex;
            justify-content: space-between;
            align-items: center;
            backdrop-filter: blur(8px);
        }

        .logo-area {
            display: flex;
            align-items: center;
            text-decoration: none;
            color: white;
            z-index: 110;
        }
        .logo-image { height: 50px; width: auto; margin-right: 15px; }
        .company-name { font-size: 24px; font-weight: bold; letter-spacing: 0.1em; }

        /* PCメニュー */
        nav ul { list-style: none; margin: 0; padding: 0; display: flex; gap: 30px; }
        nav ul li a { 
            text-decoration: none; color: white; 
            display: flex; flex-direction: column; align-items: center; 
            transition: 0.3s; position: relative;
        }
        .nav-jp { font-size: 15px; font-weight: bold; }
        .nav-en { font-size: 9px; margin-top: 2px; opacity: 0.7; }
        nav ul li a:hover { color: #ffeb3b; transform: scale(1.1); }

        /* ハンバーガーボタン (スマホ用) */
        .menu-btn {
            display: none; /* PCでは隠す */
            cursor: pointer;
            z-index: 110;
            background: none; border: none;
            flex-direction: column; gap: 6px; padding: 10px;
        }
        .menu-btn span {
            display: block; width: 30px; height: 2px;
            background: white; transition: 0.3s;
        }

        /* --- 4. スマホ版の表示設定 (レスポンシブ) --- */
        @media (max-width: 1024px) {
            header { padding: 15px 20px; }
            .company-name { font-size: 18px; }
            .logo-image { height: 40px; }

            .menu-btn { display: flex; } /* 三本線を表示 */

            nav {
                position: fixed; top: 0; right: -100%;
                width: 100%; height: 100vh;
                background: rgba(0, 71, 157, 0.98); /* 全画面を企業の青に */
                transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1);
                display: flex; align-items: center; justify-content: center;
                z-index: 105;
            }
            nav.active { right: 0; }

            nav ul { flex-direction: column; gap: 40px; }
            .nav-jp { font-size: 24px; }
            .nav-en { font-size: 14px; }

            /* ×印のアニメーション */
            .menu-btn.active span:nth-child(1) { transform: translateY(8px) rotate(45deg); }
            .menu-btn.active span:nth-child(2) { opacity: 0; }
            .menu-btn.active span:nth-child(3) { transform: translateY(-8px) rotate(-45deg); }
        }

        /* --- 5. メインビジュアル --- */
        .hero {
            position: relative;
            width: 100%; height: 100vh;
            background: url('main_haikei.jpg') center/cover no-repeat;
            display: flex; justify-content: center; align-items: center;
            color: white; text-align: center;
        }
        .hero::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.3); }
        .hero-content { position: relative; z-index: 1; }
        .hero-content h1 { font-size: 4.5rem; margin: 0; letter-spacing: 0.3em; text-shadow: 0 0 20px rgba(0,0,0,0.5); }
        .hero-content p { font-size: 1.2rem; margin-top: 15px; letter-spacing: 0.4em; }

        @media (max-width: 768px) {
            .hero-content h1 { font-size: 2.2rem; letter-spacing: 0.1em; }
            .hero-content p { font-size: 1rem; }
        }

        /* スクロールダウン */
        .scrolldown {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; z-index: 2;
        }
        .arrow { width: 1px; height: 80px; background: rgba(255,255,255,0.5); position: relative; overflow: hidden; }
        .arrow::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; animation: scroll-ani 2.5s infinite; }
        @keyframes scroll-ani { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }

        /* --- 6. コンテンツセクション --- */
        section { padding: 100px 8%; text-align: center; }
        .section-title h2 { font-size: 2.2rem; color: #00479d; margin-bottom: 50px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 30px; }
        .card { background: white; padding: 40px 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.05); border-radius: 5px; border-top: 5px solid #00479d; }

        footer { background: #222; color: #fff; padding: 40px; text-align: center; font-size: 13px; }
    </style>
</head>
<body>

    <div id="loading">
        <div class="loading-content">
            <div class="dot"></div>
            <div class="dot"></div>
            <div class="dot"></div>
            <p class="loading-text">CONNECTING...</p>
        </div>
    </div>

    <header>
        <a href="index.html" class="logo-area">
            <img src="miko.png" alt="ロゴ" class="logo-image">
            <span class="company-name">大和電気株式会社</span>
        </a>

        <button class="menu-btn" id="menuBtn">
            <span></span>
            <span></span>
            <span></span>
        </button>

        <nav id="navMenu">
            <ul>
                <li><a href="#business" onclick="closeMenu()"><span class="nav-jp">事業案内</span><span class="nav-en">Business</span></a></li>
                <li><a href="#works" onclick="closeMenu()"><span class="nav-jp">実績紹介</span><span class="nav-en">Works</span></a></li>
                <li><a href="company.html"><span class="nav-jp">会社概要</span><span class="nav-en">Company</span></a></li>
                <li><a href="contact.html"><span class="nav-jp">お問い合わせ</span><span class="nav-en">Contact</span></a></li>
                <li><a href="recruit.html"><span class="nav-jp">採用情報</span><span class="nav-en">Recruit</span></a></li>
            </ul>
        </nav>
    </header>

    <div class="hero">
        <div class="hero-content">
            <h1>DAIWA DENKI</h1>
            <p>光り輝く未来を、電気の技術で。</p>
        </div>
        <div class="scrolldown"><div class="arrow"></div></div>
    </div>

    <section id="business">
        <div class="section-title"><h2>事業案内</h2></div>
        <div class="grid">
            <div class="card"><h3>電気工事</h3><p>ビル、店舗、住宅のあらゆる電気設備に対応します。</p></div>
            <div class="card"><h3>通信工事</h3><p>安定したネットワークインフラを構築します。</p></div>
            <div class="card"><h3>保守点検</h3><p>24時間365日、安心のメンテナンス体制。</p></div>
        </div>
    </section>

    <footer>
        &copy; 2026 大和電気株式会社 All Rights Reserved.
    </footer>

    <script>
        // ローディング解除の動き
        window.addEventListener('load', function() {
            setTimeout(function() {
                const loader = document.getElementById('loading');
                loader.classList.add('loaded');
            }, 1500); // 1.5秒しっかり見せる
        });

        // ハンバーガーメニューの開閉制御
        const menuBtn = document.getElementById('menuBtn');
        const navMenu = document.getElementById('navMenu');

        menuBtn.addEventListener('click', () => {
            menuBtn.classList.toggle('active');
            navMenu.classList.toggle('active');
        });

        // メニュー内リンクをクリックした時にメニューを閉じる
        function closeMenu() {
            menuBtn.classList.remove('active');
            navMenu.classList.remove('active');
        }
    </script>
</body>
</html>
