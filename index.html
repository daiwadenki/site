<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>大和電気株式会社 | DAIWA DENKI</title>
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <style>
        #loading {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background-color: #00479d; display: flex; justify-content: center; align-items: center; z-index: 9999;
            transition: opacity 0.8s ease, visibility 0.8s;
        }
        #loading.loaded { opacity: 0; visibility: hidden; }
        .loading-content { text-align: center; }
        .dot { display: inline-block; width: 25px; height: 25px; margin: 0 10px; background-color: #ffeb3b; border-radius: 50%; animation: bounce 0.6s infinite alternate; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-30px); scale: 1.1; } }
        .loading-text { margin-top: 30px; color: white; font-weight: bold; letter-spacing: 0.4em; font-size: 14px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        body, html { margin: 0; padding: 0; width: 100%; font-family: "Helvetica Neue", Arial, sans-serif; scroll-behavior: smooth; color: #333; overflow-x: hidden; }
        
        header {
            position: fixed; top: 0; width: 100%; padding: 20px 60px; box-sizing: border-box; z-index: 100;
            background: rgba(0, 0, 0, 0.6); display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(5px);
        }
        .logo-area { display: flex; align-items: center; text-decoration: none; color: white; }
        .logo-image { height: 55px; width: auto; margin-right: 20px; }
        .company-name { font-size: 26px; font-weight: bold; letter-spacing: 0.1em; }

        nav ul { list-style: none; margin: 0; padding: 0; display: flex; gap: 40px; }
        nav ul li a { text-decoration: none; color: white; display: flex; flex-direction: column; align-items: center; transition: all 0.3s ease; position: relative; }
        .nav-jp { font-size: 16px; font-weight: bold; }
        .nav-en { font-size: 10px; margin-top: 4px; opacity: 0.8; }
        nav ul li a:hover { transform: scale(1.15); color: #ffeb3b; }
        nav ul li a::after { content: ""; position: absolute; bottom: -8px; left: 0; width: 0; height: 2px; background: #ffeb3b; transition: width 0.3s; }
        nav ul li a:hover::after { width: 100%; }

        .hero { position: relative; width: 100%; height: 100vh; background-image: url('main_haikei.jpg'); background-size: cover; background-position: center; display: flex; justify-content: center; align-items: center; color: white; text-align: center; }
        .hero::before { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.3); }
        .hero-content { position: relative; z-index: 1; }
        .hero-content h1 { font-size: 5rem; margin: 0; letter-spacing: 0.3em; text-shadow: 0 0 30px rgba(0,0,0,0.5); }
        .hero-content p { font-size: 1.2rem; margin-top: 10px; letter-spacing: 0.5em; }

        .scrolldown { position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); display: flex; align-items: center; z-index: 2; }
        .scrolldown span { writing-mode: vertical-rl; font-size: 14px; letter-spacing: 0.3em; text-transform: uppercase; margin-left: 12px; font-weight: bold; color: white; }
        .arrow { width: 2px; height: 90px; background: rgba(255,255,255,0.3); position: relative; overflow: hidden; }
        .arrow::after { content: ""; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: #fff; animation: scroll-ani 2.5s infinite; }
        @keyframes scroll-ani { 0% { transform: translateY(-100%); } 100% { transform: translateY(100%); } }

        section { padding: 100px 10%; text-align: center; }
        .section-title h2 { font-size: 2.2rem; color: #00479d; margin: 0; }
        .grid-container { display: grid; grid-template-columns: repeat(auto-fit, minmax(280px, 1fr)); gap: 30px; margin-top: 50px; }
        .card { background: white; padding: 40px 20px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); border-radius: 4px; border-top: 4px solid #00479d; }

        footer { background: #222; color: #fff; padding: 30px; text-align: center; font-size: 0.8rem; }
        @media (max-width: 900px) {
            header { padding: 15px; flex-direction: column; }
            nav ul { gap: 15px; margin-top: 15px; flex-wrap: wrap; justify-content: center; }
            .hero-content h1 { font-size: 3rem; }
        }
    </style>
</head>
<body>
    <div id="loading"><div class="loading-content"><div class="dot"></div><div class="dot"></div><div class="dot"></div><p class="loading-text">CONNECTING...</p></div></div>

    <header>
        <a href="index.html" class="logo-area">
            <img src="miko.png" alt="ロゴ" class="logo-image">
            <span class="company-name">大和電気株式会社</span>
        </a>
        <nav>
            <ul>
                <li><a href="#business"><span class="nav-jp">事業案内</span><span class="nav-en">Business</span></a></li>
                <li><a href="#works"><span class="nav-jp">実績紹介</span><span class="nav-en">Works</span></a></li>
                <li><a href="company.html"><span class="nav-jp">会社概要</span><span class="nav-en">Company</span></a></li>
                <li><a href="contact.html"><span class="nav-jp">お問い合わせ</span><span class="nav-en">Contact</span></a></li>
                <li><a href="recruit.html"><span class="nav-jp">採用情報</span><span class="nav-en">Recruit</span></a></li>
            </ul>
        </nav>
    </header>

    <div class="hero">
        <div class="hero-content"><h1>DAIWA DENKI</h1><p>光り輝く未来を、電気の技術で。</p></div>
        <div class="scrolldown"><div class="arrow"></div><span>Scroll Down</span></div>
    </div>

    <section id="business">
        <div class="section-title"><h2>事業案内</h2><p>BUSINESS</p></div>
        <div class="grid-container">
            <div class="card"><h3>電気工事</h3><p>ビルや工場の受変電設備から一般住宅まで対応します。</p></div>
            <div class="card"><h3>通信工事</h3><p>ネットワーク構築、LAN配線などを行います。</p></div>
            <div class="card"><h3>メンテナンス</h3><p>設備の保守点検から緊急トラブルまで対応します。</p></div>
        </div>
    </section>

    <footer>&copy; 2026 大和電気株式会社 All Rights Reserved.</footer>

    <script>
        window.addEventListener('load', function() {
            setTimeout(function() { document.getElementById('loading').classList.add('loaded'); }, 1500);
        });
    </script>
</body>
</html>
